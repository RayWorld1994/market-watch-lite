<button
  type="button"
  class="asset-card flex w-full cursor-pointer items-center gap-3 rounded-xl p-4 text-left transition-colors"
  (click)="onSelect()"
>
  <span
    class="flex h-10 w-10 shrink-0 items-center justify-center overflow-hidden rounded-full"
    style="background-color: var(--color-surface-strong)"
  >
    <img
      [src]="coin().image"
      [alt]="coin().name"
      class="h-8 w-8 object-contain"
      loading="lazy"
    />
  </span>

  <div class="flex min-w-0 flex-1 flex-col">
    <span
      class="truncate text-sm font-semibold"
      style="color: var(--color-text-primary)"
    >
      {{ coin().name }}
    </span>
    <span class="text-xs uppercase" style="color: var(--color-text-secondary)">
      {{ coin().symbol }}
    </span>
  </div>

  <div class="flex flex-col items-end">
    <span class="text-sm font-semibold" style="color: var(--color-text-primary)">
      {{ coin().current_price | currency:'USD':'symbol':'1.2-2' }}
    </span>
    <span
      class="text-xs font-medium"
      [ngClass]="{
        'text-green-600 dark:text-green-400': coin().price_change_percentage_24h >= 0,
        'text-red-600 dark:text-red-400': coin().price_change_percentage_24h < 0
      }"
    >
      @if (coin().price_change_percentage_24h >= 0) {
        +
      }
      {{ coin().price_change_percentage_24h | number:'1.2-2' }}%
    </span>
  </div>
</button>
