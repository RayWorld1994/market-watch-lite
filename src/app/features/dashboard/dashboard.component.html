<div class="py-4">
  <div class="mb-4 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
    <div>
      <h1 class="text-2xl font-bold" style="color: var(--color-text-primary)">
        {{ 'dashboard.title' | transloco }}
      </h1>
      <p class="mt-1 text-sm" style="color: var(--color-text-secondary)">
        {{ 'dashboard.subtitle' | transloco }}
      </p>
    </div>

    <p-iconfield iconPosition="left" class="relative w-full md:w-72">
      <p-inputicon styleClass="pi pi-search" />
      <input
        type="text"
        pInputText
        [placeholder]="'dashboard.searchPlaceholder' | transloco"
        [value]="searchValue()"
        class="w-full pr-10"
        (input)="onSearchInput($any($event.target).value)"
      />
      @if (searchValue()) {
        <button
          type="button"
          class="absolute right-2 top-1/2 flex h-7 w-7 -translate-y-1/2 cursor-pointer items-center justify-center rounded-full border-0 bg-transparent transition-colors hover:bg-black/5 dark:hover:bg-white/10"
          style="color: var(--color-text-secondary)"
          [attr.aria-label]="'dashboard.clearSearch' | transloco"
          (click)="clearSearch()"
        >
          <span class="pi pi-times text-xs"></span>
        </button>
      }
    </p-iconfield>
  </div>

  @if (error(); as err) {
    <div
      class="mb-4 flex items-center gap-2 rounded-lg px-4 py-3 text-sm"
      style="background-color: color-mix(in srgb, var(--color-brand) 10%, transparent); color: var(--color-brand)"
    >
      <span class="pi pi-exclamation-triangle"></span>
      <span>{{ err }}</span>
    </div>
  }

  <app-asset-list
    [coins]="filteredCoins()"
    [loading]="loading()"
    (assetSelected)="onAssetSelected($event)"
  />

  <app-asset-detail />
</div>
